<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Direct message — Salme me Dink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --slack-purple: #4a154b;
      --slack-purple-dark: #350d36;
      --panel-bg: #f8f8f8;
      --border: #e0e0e0;
      --text: #1d1c1d;
      --text-secondary: #616061;
      --link: #1264a3;
      --composer-bg: #fff;
      --shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Lato", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.46668;
      color: var(--text);
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Name gate */
    .gate {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(160deg, var(--slack-purple-dark) 0%, var(--slack-purple) 100%);
    }

    .gate[hidden] {
      display: none !important;
    }

    .gate-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .gate-card h1 {
      margin: 0 0 0.5rem;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .gate-card p {
      margin: 0 0 1.25rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .gate-card label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
      color: var(--text-secondary);
    }

    .gate-card input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }

    .gate-card input[type="text"]:focus {
      outline: 2px solid #1264a3;
      outline-offset: 1px;
      border-color: #1264a3;
    }

    .gate-card button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--slack-purple);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
    }

    .gate-card button:hover {
      background: #611f69;
    }

    /* Slack shell */
    .app {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .app.is-visible {
      display: flex;
    }

    .top-bar {
      background: var(--slack-purple-dark);
      color: #fff;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .top-bar svg {
      opacity: 0.9;
    }

    .dm-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: #fff;
      flex-shrink: 0;
    }

    .dm-header img {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      object-fit: cover;
      background: #ddd;
    }

    .dm-header .titles {
      flex: 1;
      min-width: 0;
    }

    .dm-header .name {
      font-weight: 700;
      font-size: 1rem;
    }

    .dm-header .status {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      background: var(--panel-bg);
    }

    .day-divider {
      text-align: center;
      margin: 0.5rem 0 1.25rem;
      position: relative;
    }

    .day-divider span {
      background: var(--panel-bg);
      padding: 0 0.75rem;
      position: relative;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .day-divider::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--border);
    }

    .msg-row {
      display: flex;
      gap: 0.65rem;
      margin-bottom: 1rem;
      align-items: flex-start;
    }

    .msg-row--salme .avatar {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: cover;
      background: #ddd;
    }

    .msg-row--user {
      flex-direction: row-reverse;
    }

    .msg-row--user .msg-stack {
      align-items: flex-end;
      max-width: min(75%, 520px);
    }

    .msg-row--salme .msg-stack {
      max-width: min(85%, 640px);
    }

    .msg-stack {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .msg-meta-line {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .msg-row--user .msg-meta-line {
      justify-content: flex-end;
    }

    .sender {
      font-weight: 900;
      font-size: 0.95rem;
    }

    .time {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .bubble {
      background: #fff;
      padding: 0.35rem 0.65rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row--user .bubble {
      background: #e8f5fa;
      border-color: #c5e6f2;
    }

    .read-receipt {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.15rem;
      padding-right: 2px;
    }

    .msg-row--salme .read-receipt {
      align-self: flex-start;
    }

    .reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.25rem;
    }

    .msg-row--user .reactions {
      justify-content: flex-end;
    }

    .reaction-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.1rem 0.45rem 0.1rem 0.35rem;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      cursor: default;
    }

    .reaction-pill .emoji {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
      line-height: 1.2;
    }

    .reaction-pill .count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .composer-wrap {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem 1rem;
      background: var(--composer-bg);
      flex-shrink: 0;
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      background: #fff;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .composer:focus-within {
      border-color: #1264a3;
      box-shadow: 0 0 0 1px #1264a3;
    }

    .composer textarea {
      flex: 1;
      border: none;
      resize: none;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      min-height: 22px;
      max-height: 160px;
      padding: 0.25rem 0;
    }

    .composer textarea:focus {
      outline: none;
    }

    .composer button.send {
      flex-shrink: 0;
      background: var(--slack-purple);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.4rem 0.85rem;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }

    .composer button.send:hover:not(:disabled) {
      background: #611f69;
    }

    .composer button.send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>Open a direct message</h1>
      <p>Enter the name you use at work so the thread looks right.</p>
      <form id="name-form" autocomplete="off">
        <label for="user-name">Your name</label>
        <input type="text" id="user-name" name="name" required maxlength="80" placeholder="e.g. Alex" autofocus>
        <button type="submit">Continue</button>
      </form>
    </div>
  </div>

  <div class="app" id="app" aria-hidden="true">
    <header class="top-bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5.5 4.5h13v15h-13v-15z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M8 8h8M8 12h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Slack
    </header>
    <div class="dm-header">
      <img src="../assets/selma.png" alt="" width="36" height="36" id="salme-header-avatar">
      <div class="titles">
        <div class="name">Salme me Dink (she/they)</div>
        <div class="status" id="dm-subtitle">Direct message</div>
      </div>
    </div>
    <div class="messages" id="messages" role="log" aria-live="polite" aria-relevant="additions"></div>
    <div class="composer-wrap">
      <div class="composer">
        <label for="composer-input" class="visually-hidden">Message</label>
        <textarea id="composer-input" rows="1" placeholder="Message Salme me Dink" maxlength="4000"></textarea>
        <button type="button" class="send" id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <script>
    (function () {
      var SALME_AVATAR = "../assets/selma.png";
      var SALME_DISPLAY = "Salme me Dink (she/they)";
      /** Thumbs up + Fitzpatrick type-6 modifier (skin tone 6). */
      var THUMBS_UP_SKIN_6 = "\uD83D\uDC4D\uD83C\uDFFF";

      var gate = document.getElementById("gate");
      var app = document.getElementById("app");
      var nameForm = document.getElementById("name-form");
      var userNameInput = document.getElementById("user-name");
      var messagesEl = document.getElementById("messages");
      var composer = document.getElementById("composer-input");
      var sendBtn = document.getElementById("send-btn");
      var dmSubtitle = document.getElementById("dm-subtitle");

      var userDisplayName = "";

      function pad2(n) {
        return n < 10 ? "0" + n : String(n);
      }

      function formatTime(d) {
        var h = d.getHours();
        var m = d.getMinutes();
        var ampm = h >= 12 ? "PM" : "AM";
        h = h % 12;
        if (h === 0) h = 12;
        return h + ":" + pad2(m) + " " + ampm;
      }

      function todayHeading() {
        var d = new Date();
        var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function appendDayDivider() {
        var div = document.createElement("div");
        div.className = "day-divider";
        div.innerHTML = "<span>" + escapeHtml(todayHeading()) + "</span>";
        messagesEl.appendChild(div);
      }

      function appendSalmeMessage(text) {
        var row = document.createElement("div");
        row.className = "msg-row msg-row--salme";
        row.innerHTML =
          '<img class="avatar" src="' + SALME_AVATAR + '" alt="">' +
          '<div class="msg-stack">' +
          '<div class="msg-meta-line">' +
          '<span class="sender">' + escapeHtml(SALME_DISPLAY) + "</span>" +
          '<span class="time">' + escapeHtml(formatTime(new Date())) + "</span>" +
          "</div>" +
          '<div class="bubble">' + escapeHtml(text).replace(/\n/g, "<br>") + "</div>" +
          "</div>";
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendUserMessageWithReadAndReaction(text) {
        var row = document.createElement("div");
        row.className = "msg-row msg-row--user";
        row.innerHTML =
          '<div class="msg-stack">' +
          '<div class="msg-meta-line">' +
          '<span class="sender">' + escapeHtml(userDisplayName) + "</span>" +
          '<span class="time">' + escapeHtml(formatTime(new Date())) + "</span>" +
          "</div>" +
          '<div class="bubble">' + escapeHtml(text).replace(/\n/g, "<br>") + "</div>" +
          '<div class="read-receipt">Read</div>' +
          '<div class="reactions">' +
          '<span class="reaction-pill" title="' + escapeHtml(SALME_DISPLAY) + '">' +
          '<span class="emoji">' + THUMBS_UP_SKIN_6 + "</span>" +
          '<span class="count">1</span>' +
          "</span>" +
          "</div>" +
          "</div>";
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function salmeOpeningMessage(name) {
        return (
          "Dear " + name + ", I'll be away until 5th of July... but I have time today until 16:45 if you want...\nSalme"
        );
      }

      nameForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var raw = userNameInput.value.trim();
        if (!raw) return;
        userDisplayName = raw.slice(0, 80);
        gate.hidden = true;
        gate.setAttribute("aria-hidden", "true");
        app.classList.add("is-visible");
        app.setAttribute("aria-hidden", "false");
        dmSubtitle.textContent = "Direct message with " + userDisplayName;

        appendDayDivider();
        appendSalmeMessage(salmeOpeningMessage(userDisplayName));
        composer.focus();
      });

      function maybeResizeComposer() {
        composer.style.height = "auto";
        composer.style.height = Math.min(composer.scrollHeight, 160) + "px";
      }

      composer.addEventListener("input", function () {
        sendBtn.disabled = !composer.value.trim();
        maybeResizeComposer();
      });

      function sendMessage() {
        var text = composer.value.trim();
        if (!text) return;
        composer.value = "";
        sendBtn.disabled = true;
        composer.style.height = "auto";
        appendUserMessageWithReadAndReaction(text);
        composer.focus();
      }

      sendBtn.addEventListener("click", sendMessage);
      composer.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (!sendBtn.disabled) sendMessage();
        }
      });
    })();
  </script>
</body>
</html>
