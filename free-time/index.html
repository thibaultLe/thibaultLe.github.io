<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <title>Thibault Lechien — Free time &amp; photography</title>
  <meta name="description" content="Hobbies and photography — Thibault Lechien">

  <link rel="icon" href="/assets/galaxy.png">
  <link rel="icon" type="image/x-icon" href="/assets/galaxy.png">

  <link rel="stylesheet" href="../stylesheets/styles.css">
  <link rel="stylesheet" href="../stylesheets/pygment_trac.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <style>
    :root {
      --background-color: #fff;
      --text-color: #000;
    }

    [data-theme="dark"] {
      --background-color: #1f1f1f;
      --text-color: #fff;
    }

    body {
      background-color: var(--background-color);
      color: var(--text-color);
    }

    header h1, header p, section h1, section h2, section p {
      color: var(--text-color);
    }

    .theme-switch-wrapper {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    :root {
      --toggleHeight: 2em;
      --toggleWidth: 3.75em;
      --toggleBtnRadius: 1.25em;
      --bgColor--night: #423966;
      --mooncolor: #D9FBFF;
      --bgColor--day: #9ee3fb;
    }

    .tdnn {
      margin: 0 auto;
      font-size: 100%;
      position: relative;
      height: var(--toggleHeight);
      width: var(--toggleWidth);
      border-radius: var(--toggleHeight);
      transition: all 500ms ease-in-out;
      background: var(--bgColor--night);
      cursor: pointer;
    }

    .day {
      background: #FFBF71;
    }

    .moon {
      position: absolute;
      display: block;
      border-radius: 50%;
      transition: all 400ms ease-in-out;
      top: 0.375em;
      left: 0.375em;
      transform: rotate(-75deg);
      width: var(--toggleBtnRadius);
      height: var(--toggleBtnRadius);
      background: var(--bgColor--night);
      box-shadow:
        0.375em 0.3125em 0 0em var(--mooncolor) inset,
        rgba(255, 255, 255, 0.1) 0em -0.875em 0 -0.5625em,
        rgba(255, 255, 255, 0.1) 0.375em 0.875em 0 -0.5625em,
        rgba(255, 255, 255, 0.1) 0.25em 1.625em 0 -0.5em,
        rgba(255, 255, 255, 0.1) 0.75em 0.25em 0 -0.5125em,
        rgba(255, 255, 255, 0.1) 1em 1em 0 -0.5625em,
        rgba(255, 255, 255, 0.1) 0.75em 1.625em 0 -0.5625em,
        rgba(255, 255, 255, 0.1) -0.5em 0.875em 0 -0.5625em,
        rgba(255, 255, 255, 0.1) -0.125em 1.25em 0 -0.5625em;
    }

    .sun {
      top: 0.5625em;
      left: 2.25em;
      transform: rotate(0deg);
      width: 0.875em;
      height: 0.875em;
      background: #fff;
      box-shadow: 0.375em 0.375em 0 0.625em #fff inset,
        0 -0.625em 0 -0.3375em #fff,
        0.4375em -0.4375em 0 -0.375em #fff,
        0.625em 0 0 -0.3375em #fff,
        0.4375em 0.4375em 0 -0.375em #fff,
        0 0.625em 0 -0.3375em #fff,
        -0.4375em 0.4375em 0 -0.375em #fff,
        -0.625em 0 0 -0.3375em #fff,
        -0.4375em -0.4375em 0 -0.375em #fff;
    }

    section h1 {
      font-size: 24px;
    }

    section h2 {
      font-size: 20px;
    }

    section p, section li {
      font-size: 16px;
      text-align: justify;
    }

    .back-link {
      margin-bottom: 1.25rem;
    }

    .hobbies-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0 0 20px;
      justify-content: flex-start;
    }

    .hobby-tile {
      flex: 1 1 200px;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      contain: layout style paint;
    }

    .hobby-tile-wrap {
      position: relative;
      display: block;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 3/4;
    }

    .hobby-tile-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border-radius: 8px;
      cursor: pointer;
    }

    .hobby-tile-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 0.6rem;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .hobby-tile:hover .hobby-tile-title {
      opacity: 1;
    }

    .photography-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin: 0 0 20px;
    }

    .photography-grid img {
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
    }

    .photo-popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .photo-popup-overlay.is-visible {
      display: flex;
    }

    .photo-popup-overlay img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .non-work-section {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div class="theme-switch-wrapper">
    <div class="tdnn">
      <div class="moon"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>

  <div class="wrapper">
    <section>
      <p class="back-link"><a href="/">← Back to home</a></p>

      <h1>Free time &amp; photography</h1>

      <h2 class="non-work-section">Free time</h2>
      <div class="hobbies-row">
        <div class="hobby-tile">
          <span class="hobby-tile-wrap">
            <img src="/assets/hobbies/IMG_5897.jpg" alt="Hobby" loading="lazy" width="200" height="267">
            <span class="hobby-tile-title">Skiing</span>
          </span>
        </div>
        <div class="hobby-tile">
          <span class="hobby-tile-wrap">
            <img src="/assets/hobbies/IMG_8131.jpg" alt="Hobby" loading="lazy" width="200" height="267">
            <span class="hobby-tile-title">Various watersports (wakeboarding, surfing, etc.)</span>
          </span>
        </div>
        <div class="hobby-tile">
          <span class="hobby-tile-wrap">
            <img src="/assets/hobbies/IMG_8624.JPG" alt="Hobby" loading="lazy" width="200" height="267">
            <span class="hobby-tile-title">Volleyball</span>
          </span>
        </div>
      </div>

      <h2>Photography</h2>
      <div class="photography-grid">
        <img src="/assets/photography/IMG_2582.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_7837.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_8821.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_8723.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_8796.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_8824.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_7931.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_9063.jpg" alt="Photography" loading="lazy" width="200" height="200">
        <img src="/assets/photography/IMG_9908.jpg" alt="Photography" loading="lazy" width="200" height="200">
      </div>
      <div class="photo-popup-overlay" id="photoPopupOverlay" aria-hidden="true">
        <img id="photoPopupImg" src="" alt="Enlarged image">
      </div>
      <script>
        (function () {
          var overlay = document.getElementById("photoPopupOverlay");
          var popupImg = document.getElementById("photoPopupImg");
          function closePhotoPopup() {
            overlay.classList.remove("is-visible");
            overlay.setAttribute("aria-hidden", "true");
          }
          function openPopup(src) {
            popupImg.src = src;
            overlay.classList.add("is-visible");
            overlay.removeAttribute("aria-hidden");
          }
          document.querySelector("section").addEventListener("click", function (e) {
            var img = e.target.closest(".photography-grid img, .hobby-tile-wrap img");
            if (img) openPopup(img.src);
          });
          overlay.addEventListener("click", function (e) {
            if (e.target === overlay) closePhotoPopup();
          });
          document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" && overlay.classList.contains("is-visible")) closePhotoPopup();
          });
        })();
      </script>
    </section>

    <footer>
      <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p>
    </footer>
  </div>
  <script src="../javascripts/scale.fix.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".tdnn");
      const moon = document.querySelector(".moon");

      function switchTheme() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        if (!isDark) {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
          moon.classList.remove("sun");
          toggle.classList.remove("day");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
          localStorage.setItem("theme", "light");
          moon.classList.add("sun");
          toggle.classList.add("day");
        }
      }

      toggle.addEventListener("click", switchTheme);

      const currentTheme = localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

      if (currentTheme) {
        document.documentElement.setAttribute("data-theme", currentTheme);
        if (currentTheme === "dark") {
          moon.classList.remove("sun");
          toggle.classList.remove("day");
        } else {
          moon.classList.add("sun");
          toggle.classList.add("day");
        }
      }
    });
  </script>
</body>

</html>
