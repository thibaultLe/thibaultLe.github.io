<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FBR Talks – Prediction</title>
  <link rel="stylesheet" href="../stylesheets/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    .candidate-card { cursor: pointer; }
    .candidate-card.selected { outline: 3px solid #39c; outline-offset: 2px; }
    .candidate-card .card-img-top { height: 200px; object-fit: cover; display: block; }
    .count-badge { font-size: 1rem; }
  </style>
</head>
<body>
  <div class="wrapper py-4">
    <h1>FBR Talks – Predict the 8 selected speakers</h1>
    <p class="text-muted">Select exactly 8 people. Your prediction will be stored so we can compare accuracy once the committee announces the results.</p>

    <div class="mb-3 d-flex align-items-center gap-3 flex-wrap">
      <span class="badge bg-secondary count-badge">Selected: <span id="count">0</span> / 8</span>
      <input type="text" id="name" class="form-control" style="max-width: 220px;" placeholder="Your name" aria-label="Your name">
      <button type="button" id="submitBtn" class="btn btn-primary" disabled>Submit prediction</button>
      <span id="message" class="text-success"></span>
    </div>

    <div id="grid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-4 g-3"></div>
  </div>

  <script src="config.js"></script>
  <script>
    const MAX_SELECT = 8;
    let candidates = [];
    const selected = new Set();

    const gridEl = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const nameEl = document.getElementById('name');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    function buildGrid() {
      gridEl.innerHTML = candidates.map(c => `
        <div class="col">
          <div class="card candidate-card" data-id="${escapeAttr(c.id)}" title="Click to select">
            <img class="card-img-top" src="${escapeAttr(c.imageUrl)}" alt="" loading="lazy" width="200" height="200">
            <div class="card-body py-2">
              <div class="card-text small text-center">${escapeHtml(c.name)}</div>
            </div>
          </div>
        </div>`).join('');
    }

    function updateUI() {
      countEl.textContent = selected.size;
      submitBtn.disabled = selected.size !== MAX_SELECT || !nameEl.value.trim();
      gridEl.querySelectorAll('.candidate-card').forEach(card => {
        card.classList.toggle('selected', selected.has(card.dataset.id));
        card.title = selected.has(card.dataset.id) ? 'Click to deselect' : 'Click to select';
      });
    }

    function escapeAttr(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML.replace(/"/g, '&quot;');
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function toggle(id) {
      if (selected.has(id)) selected.delete(id);
      else if (selected.size < MAX_SELECT) selected.add(id);
      updateUI();
    }

    gridEl.addEventListener('click', (e) => {
      const card = e.target.closest('.candidate-card');
      if (card) toggle(card.dataset.id);
    });

    submitBtn.addEventListener('click', async () => {
      const name = nameEl.value.trim();
      if (!name || selected.size !== MAX_SELECT) return;
      const url = window.SUPABASE_URL;
      const key = window.SUPABASE_ANON_KEY;
      if (!url || !key || url.includes('YOUR_PROJECT')) {
        messageEl.textContent = 'Supabase not configured. Edit prediction/config.js with your project URL and anon key.';
        messageEl.className = 'text-danger';
        return;
      }
      submitBtn.disabled = true;
      messageEl.textContent = '';
      try {
        const res = await fetch(url + '/rest/v1/predictions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': key,
            'Authorization': 'Bearer ' + key,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            submitter_name: name,
            selected_ids: Array.from(selected)
          })
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err || res.statusText);
        }
        messageEl.textContent = 'Prediction saved. Good luck!';
        messageEl.className = 'text-success';
        selected.clear();
        nameEl.value = '';
        updateUI();
        submitBtn.disabled = false;
      } catch (e) {
        messageEl.textContent = 'Error saving: ' + (e.message || String(e));
        messageEl.className = 'text-danger';
        submitBtn.disabled = false;
      }
    });

    fetch('candidates.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        candidates = data;
        buildGrid();
        updateUI();
      })
      .catch(() => {
        gridEl.innerHTML = '<p class="text-danger">Could not load candidates.json. Add entries (id, name, imageUrl) as in prediction/README.md.</p>';
      });
  </script>
</body>
</html>
