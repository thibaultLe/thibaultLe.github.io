<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FBR Talks – Results</title>
  <link rel="stylesheet" href="../stylesheets/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <div class="wrapper py-4">
    <h1>FBR Talks – Leaderboard</h1>
    <p class="text-muted">Enter the 8 candidate IDs selected by the committee (comma- or newline-separated), then load predictions to see who was most accurate.</p>

    <div class="mb-4">
      <label for="committeeIds" class="form-label">Committee’s 8 selected IDs</label>
      <textarea id="committeeIds" class="form-control" rows="3" placeholder="e.g. 1, 2, 5, 7, 12, 15, 20, 22"></textarea>
      <button type="button" id="loadBtn" class="btn btn-primary mt-2">Load predictions and compute leaderboard</button>
    </div>

    <p id="error" class="text-danger"></p>
    <div id="leaderboard"></div>
  </div>

  <script src="config.js"></script>
  <script>
    const url = window.SUPABASE_URL;
    const key = window.SUPABASE_ANON_KEY;
    const committeeIdsEl = document.getElementById('committeeIds');
    const loadBtn = document.getElementById('loadBtn');
    const errorEl = document.getElementById('error');
    const leaderboardEl = document.getElementById('leaderboard');

    function parseIds(text) {
      return text.split(/[\s,\n]+/).map(s => s.trim()).filter(Boolean);
    }

    loadBtn.addEventListener('click', async () => {
      const raw = committeeIdsEl.value.trim();
      const committeeSet = new Set(parseIds(raw));
      if (committeeSet.size !== 8) {
        errorEl.textContent = 'Please enter exactly 8 unique IDs.';
        leaderboardEl.innerHTML = '';
        return;
      }
      if (!url || !key || url.includes('YOUR_PROJECT')) {
        errorEl.textContent = 'Supabase not configured. Edit prediction/config.js.';
        leaderboardEl.innerHTML = '';
        return;
      }
      errorEl.textContent = '';
      loadBtn.disabled = true;
      try {
        const res = await fetch(url + '/rest/v1/predictions?select=submitter_name,selected_ids,created_at&order=created_at.desc', {
          headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
        });
        if (!res.ok) throw new Error(await res.text() || res.statusText);
        const predictions = await res.json();
        if (!predictions.length) {
          leaderboardEl.innerHTML = '<p class="text-muted">No predictions in the database yet.</p>';
          loadBtn.disabled = false;
          return;
        }
        const scores = predictions.map(p => {
          const hits = (p.selected_ids || []).filter(id => committeeSet.has(String(id))).length;
          return { name: p.submitter_name, hits, total: 8 };
        });
        scores.sort((a, b) => b.hits - a.hits);
        leaderboardEl.innerHTML = `
          <h2 class="h4 mt-4">Leaderboard</h2>
          <table class="table table-striped">
            <thead><tr><th>Rank</th><th>Name</th><th>Correct</th></tr></thead>
            <tbody>
              ${scores.map((s, i) => `<tr><td>${i + 1}</td><td>${escapeHtml(s.name)}</td><td>${s.hits} / 8</td></tr>`).join('')}
            </tbody>
          </table>`;
      } catch (e) {
        errorEl.textContent = 'Error: ' + (e.message || String(e));
        leaderboardEl.innerHTML = '';
      }
      loadBtn.disabled = false;
    });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
